networks:
  demo_network:
    driver: bridge

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules
    user: root
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /etc/prometheus/rules
        touch /etc/prometheus/prometheus.yml
        touch /etc/prometheus/rules/alert-rules.yml
        exec /bin/prometheus --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - demo_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.1
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - demo_network
    restart: unless-stopped

  node_exporter:
    image: prom/node-exporter:latest
    container_name: host-node-exporter
    ports:
      - "9100:9100"
    networks:
      - demo_network
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points="^/(sys|proc|dev|host|etc)($|/)"'
    restart: unless-stopped

  blackbox_exporter:
    image: prom/blackbox-exporter:latest
    container_name: host-blackbox
    ports:
      - "9115:9115"
    networks:
      - demo_network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./prometheus/alertmanager:/etc/prometheus/alertmanager
    user: root
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /etc/prometheus/alertmanager
        touch /etc/prometheus/alertmanager/alertmanager.yml
    networks:
      - demo_network
    restart: unless-stopped