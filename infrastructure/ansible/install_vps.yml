- name: Ten cua playbook
  hosts: danh_sach_hosts
  become: true
  
  tasks:
    - name: Cap nhat he thong
      apt:
        update_cache: yes
        upgrade: yes
    
    - name: Cai docker
      apt:
        name: docker.io
        state: present
    
    - name: Cai docker-compose
      shell: curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose

    - name: Cap quyen cho docker-compose
      shell: chmod 700 /usr/local/bin/docker-compose
    
    - name: clone repository
      git:
        repo: 'https://github.com/nhikute987654321/capstone-mern-todo-app-devops002.git'
        dest: /root/devops02
        version: 'main'
    
    - name: Deploy application
      shell: cd /root/devops02 && docker-compose up --build -d


















